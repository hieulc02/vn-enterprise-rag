# Comments are provided throughout this file to help you get started.
# If you need more help, visit the Docker Compose reference guide at
# https://docs.docker.com/go/compose-spec-reference/

# Here the instructions define your application as a service called "server".
# This service is built from the Dockerfile in the current directory.
# You can add other services your application may depend on here, such as a
# database or a cache. For examples, see the Awesome Compose repository:
# https://github.com/docker/awesome-compose
services:

  postgres-db:
     image: pgvector/pgvector:pg16
     container_name: insightrag-local-postgres
     restart: unless-stopped
     volumes:
       - db-data:/var/lib/postgresql/data
     env_file:
       - .env
#     environment:
#       - POSTGRES_DB=${POSTGRES_DB}
#       - POSTGRES_USER=${POSTGRES_USER}
#       - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
     expose:
       - 5432
     ports:
      - "5432:5432"
     healthcheck:
       test: [ "CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}" ]
       interval: 10s
       timeout: 5s
       retries: 5

  rabbitmq:
    image: rabbitmq:4.3.0-management-alpine
    container_name: insightrag-local-rabbitmq
    env_file:
      - .env
#    environment:
#      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
#      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
#      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/lib/rabbitmq/.erlang.cookie && rabbitmq-diagnostics -q ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 10s

  minio:
    image: pgsty/minio
    container_name: insightrag-local-minio
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - .env
    environment:
#      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
#      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_NOTIFY_AMQP_ENABLE_1: "on"
      MINIO_NOTIFY_AMQP_DURABLE_1: "on"
      MINIO_NOTIFY_AMQP_EXCHANGE_1: main.direct.exchange
      MINIO_NOTIFY_AMQP_EXCHANGE_TYPE_1: direct
      MINIO_NOTIFY_AMQP_ROUTING_KEY_1: worker.process
      MINIO_NOTIFY_AMQP_URL_1: "amqp://rabbitmq:rabbitmq@rabbitmq:5672"
    volumes:
      - minio_storage:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 3s
      timeout: 3s
      retries: 5

  minio-cli:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1
    container_name: insightrag-local-minioinit
    env_file:
      - .env
#    environment:
#      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
#      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ../../script/minio-init.sh:/minio-init.sh:ro #mount script to container's root folder
    entrypoint: ["/bin/sh", "/minio-init.sh"]

volumes:
  db-data:
  minio_storage:
  rabbitmq-data:


