spring.application.name=insightrag-worker

spring.datasource.url=jdbc:postgresql://localhost:5432/insightrag_db
spring.datasource.username=insightrag
spring.datasource.password=insightrag
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=worker_schema
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

#logging.level.org.flywaydb=DEBUG
#logging.level.org.springframework.amqp=DEBUG
logging.level.org.springframework.transaction=DEBUG

spring.rabbitmq.username=rabbitmq
spring.rabbitmq.password=rabbitmq

minio.endpoint=http://127.0.0.1:9000
minio.credentials.username=minioadmin
minio.credentials.password=miniopassword
minio.bucket.exchange.name=minio_buckets_events
minio.bucket.exchange.type=direct

insightrag.file-uploaded.allowed-content-types[0]=application/pdf
insightrag.file-uploaded.allowed-content-types[1]=application/vnd.openxmlformats-officedocument.wordprocessingml.document
insightrag.file-uploaded.allowed-content-types[2]=application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
insightrag.file-uploaded.max-file-size-mb=50
insightrag.file-uploaded.e-tag-threshold-mb=16


